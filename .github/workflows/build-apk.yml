name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform (only if missing)
        run: npx cap add android || true

      - name: Configure AdMob App ID in AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" "$MANIFEST"; then
            sed -i 's#</application>#    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-5597473845785969~5354474429"/>\n    </application>#' "$MANIFEST"
          fi
          echo "---- AndroidManifest.xml after patch ----"
          cat "$MANIFEST"

      - name: Generate app icon directly into mipmap folders (never fails the build)
        run: |
          pip install --quiet Pillow || pip install --quiet --break-system-packages Pillow
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os, shutil, glob

          candidates = ['resources/icon.png', 'resource/icon.png', 'icon.png']
          found = next((p for p in candidates if os.path.isfile(p)), None)

          if not found:
              # last resort: search the whole repo for anything named icon.png
              matches = glob.glob('**/icon.png', recursive=True)
              found = matches[0] if matches else None

          print('---- repo root contents ----')
          print(os.listdir('.'))
          if os.path.isdir('resources'):
              print('---- resources/ contents ----')
              print(os.listdir('resources'))
          else:
              print('resources/ folder does not exist at build time')

          if not found:
              print('WARNING: no icon.png found anywhere in the repo — keeping the default Capacitor icon for this build. Upload resources/icon.png and re-run to customize it.')
          else:
              print('Using icon source:', found)
              src = Image.open(found).convert('RGBA')
              sizes = {'mdpi':48, 'hdpi':72, 'xhdpi':96, 'xxhdpi':144, 'xxxhdpi':192}
              base = 'android/app/src/main/res'

              for density, size in sizes.items():
                  folder = f'{base}/mipmap-{density}'
                  os.makedirs(folder, exist_ok=True)
                  resized = src.resize((size, size), Image.LANCZOS)
                  resized.save(f'{folder}/ic_launcher.png')

                  mask = Image.new('L', (size, size), 0)
                  ImageDraw.Draw(mask).ellipse([0, 0, size, size], fill=255)
                  round_icon = Image.new('RGBA', (size, size), (0,0,0,0))
                  round_icon.paste(resized, (0,0), mask)
                  round_icon.save(f'{folder}/ic_launcher_round.png')
                  print('wrote', folder)

              anydpi = f'{base}/mipmap-anydpi-v26'
              if os.path.isdir(anydpi):
                  shutil.rmtree(anydpi)
                  print('removed', anydpi)
          PYEOF
          echo "---- final icon files ----"
          find android/app/src/main/res -iname "ic_launcher*" | sort
          echo "(this step always exits successfully — the build continues either way)"
        continue-on-error: true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: flapfoco-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # ---- everything below only runs once the signing secrets are configured ----
      # (Settings -> Secrets and variables -> Actions on GitHub)
      # KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD

      - name: Check if signing secrets are configured
        id: check_signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            echo "No signing secrets found yet — skipping the release build for now."
          fi

      - name: Decode signing keystore
        if: steps.check_signing.outputs.has_signing == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          echo "keystore decoded to android/app/release.keystore"

      - name: Configure release signing in build.gradle
        if: steps.check_signing.outputs.has_signing == 'true'
        run: |
          python3 - << 'PYEOF'
          import re, sys

          path = 'android/app/build.gradle'
          with open(path) as f:
              content = f.read()

          signing_block = '''    signingConfigs {
              release {
                  storeFile file(System.getenv("KEYSTORE_PATH") ?: "release.keystore")
                  storePassword System.getenv("KEYSTORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
              }
          }
          '''

          if 'signingConfigs {' not in content:
              content = re.sub(r'(android \{\n)', r'\1' + signing_block, content, count=1)
          else:
              print('signingConfigs already present, skipping insert')

          if 'signingConfig signingConfigs.release' not in content:
              def add_signing_ref(match):
                  block = match.group(0)
                  return re.sub(r'(release \{\n)', r'\1            signingConfig signingConfigs.release\n', block, count=1)
              new_content, n = re.subn(r'buildTypes\s*\{\s*release\s*\{.*?\n(?:.*\n)*?\s*\}\s*\n\s*\}', add_signing_ref, content)
              if n == 0:
                  print('ERROR: could not find buildTypes { release { ... } } block to patch')
                  sys.exit(1)
              content = new_content
          else:
              print('signingConfig reference already present, skipping')

          with open(path, 'w') as f:
              f.write(content)

          print('---- patched build.gradle ----')
          print(content)
          PYEOF

      - name: Build signed release bundle (.aab) for the Play Store
        if: steps.check_signing.outputs.has_signing == 'true'
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload release AAB as artifact
        if: steps.check_signing.outputs.has_signing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: flapfoco-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
