name: Build FlapFoco APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar Java (necessário pro Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependências
        run: npm install

      - name: Adicionar plataforma Android (se ainda não existir)
        run: npx cap add android || true

      - name: Sincronizar web -> Android
        run: npx cap sync android

      - name: Dar permissão ao gradlew
        run: chmod +x android/gradlew

      - name: Compilar APK (debug)
        run: cd android && ./gradlew assembleDebug

      - name: Enviar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: flapfoco-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
