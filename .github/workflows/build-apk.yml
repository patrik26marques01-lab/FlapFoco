name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform (only if missing)
        run: npx cap add android || true

      - name: Configure AdMob App ID in AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" "$MANIFEST"; then
            sed -i 's#</application>#    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-5597473845785969~5354474429"/>\n    </application>#' "$MANIFEST"
          fi
          echo "---- AndroidManifest.xml after patch ----"
          cat "$MANIFEST"

      - name: Generate app icon directly into mipmap folders
        run: |
          pip install --quiet Pillow || pip install --quiet --break-system-packages Pillow
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os, shutil

          src = Image.open('resources/icon.png').convert('RGBA')
          sizes = {'mdpi':48, 'hdpi':72, 'xhdpi':96, 'xxhdpi':144, 'xxxhdpi':192}
          base = 'android/app/src/main/res'

          for density, size in sizes.items():
              folder = f'{base}/mipmap-{density}'
              os.makedirs(folder, exist_ok=True)
              resized = src.resize((size, size), Image.LANCZOS)
              resized.save(f'{folder}/ic_launcher.png')

              mask = Image.new('L', (size, size), 0)
              ImageDraw.Draw(mask).ellipse([0, 0, size, size], fill=255)
              round_icon = Image.new('RGBA', (size, size), (0,0,0,0))
              round_icon.paste(resized, (0,0), mask)
              round_icon.save(f'{folder}/ic_launcher_round.png')
              print('wrote', folder)

          # remove the adaptive-icon XML so modern Android just uses our flat PNGs
          # (avoids fighting with a foreground/background split we didn't design for)
          anydpi = f'{base}/mipmap-anydpi-v26'
          if os.path.isdir(anydpi):
              shutil.rmtree(anydpi)
              print('removed', anydpi)
          PYEOF
          echo "---- final icon files ----"
          find android/app/src/main/res -iname "ic_launcher*" | sort

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: flapfoco-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
