<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FlapFoco</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#1a1a2e; font-family:'Segoe UI',Arial,sans-serif; }
#gameCanvas { display:block; margin:0 auto; touch-action:manipulation; }
#ui { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }
.btn { pointer-events:auto; }

#topBar { position:absolute; top:16px; left:0; width:100%; display:flex; justify-content:space-between; padding:0 16px; }
#scoreDisplay {
  color:#fff; font-size:48px; font-weight:900; text-shadow:0 3px 0 rgba(0,0,0,.25), 0 0 20px rgba(255,255,255,.25);
  text-align:center; width:100%; position:absolute; top:26px; letter-spacing:1px;
}
.scorePop { animation: scorePop .28s ease; }
@keyframes scorePop { 0%{ transform:scale(1); } 40%{ transform:scale(1.35); } 100%{ transform:scale(1); } }

.coinCount {
  color:#ffe27a; font-size:16px; font-weight:800; display:flex; align-items:center; gap:6px;
  background:rgba(15,15,30,.45); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  padding:8px 16px; border-radius:24px; border:1px solid rgba(255,255,255,.12);
  box-shadow: 0 4px 14px rgba(0,0,0,.25);
}
.coinCount.pop { animation: coinPop .3s ease; }
@keyframes coinPop { 0%{transform:scale(1);} 45%{transform:scale(1.22);} 100%{transform:scale(1);} }

#menuScreen, #gameOverScreen, #shopScreen, #missionsScreen, #statsScreen, #achievementPopup {
  position:absolute; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  pointer-events:auto;
}
#menuScreen, #gameOverScreen, #shopScreen, #missionsScreen, #statsScreen {
  background: radial-gradient(ellipse at 50% 30%, rgba(30,20,55,.5), rgba(5,5,15,.72));
  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  animation: fadeInScale .38s cubic-bezier(.2,.9,.3,1.3);
  color:#fff; text-align:center;
}
@keyframes fadeInScale { from { opacity:0; transform:scale(.94); } to { opacity:1; transform:scale(1); } }

.hidden { display:none !important; }

.card {
  background: rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.14);
  border-radius:22px;
  padding:26px 24px 20px;
  box-shadow: 0 12px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  max-width:340px;
  width: 88%;
  max-height: 84vh;
  overflow-y: auto;
}

h1 {
  font-size:42px; color:#ffcc00; margin-bottom:4px; letter-spacing:1px;
  text-shadow: 0 3px 0 #b33000, 0 8px 24px rgba(255,140,0,.4);
  animation: titleBounce 2.6s ease-in-out infinite;
}
@keyframes titleBounce { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }

.subtitle { font-size:12px; color:rgba(255,255,255,.55); margin-bottom:10px; }

.menuTip {
  font-size:11.5px; color:rgba(255,255,255,.75); background:rgba(0,0,0,.22);
  border-radius:10px; padding:8px 12px; margin-bottom:12px; min-height:32px;
  display:flex; align-items:center; justify-content:center; transition: opacity .3s ease;
}
.menuStatsTeaser { font-size:14px; font-weight:800; color:#ffe27a; margin-bottom:14px; }

.bigBtn {
  position: relative; overflow: hidden;
  background: linear-gradient(180deg, #ff7a3d, #ff4500);
  color:#fff; border:none; padding:16px 34px; font-size:19px;
  border-radius:16px; margin:8px 0; font-weight:800; width:100%;
  box-shadow: 0 5px 0 #b33000, 0 10px 24px rgba(255,69,0,.35);
  cursor:pointer; letter-spacing:.3px;
  transition: transform .08s ease, box-shadow .08s ease;
}
.bigBtn::after {
  content:''; position:absolute; top:0; left:-60%; width:40%; height:100%;
  background: linear-gradient(115deg, transparent, rgba(255,255,255,.55), transparent);
  transform: skewX(-20deg);
  animation: btnShine 3.2s ease-in-out infinite;
}
@keyframes btnShine { 0%,25%{ left:-60%; } 55%,100%{ left:130%; } }
.bigBtn:active { transform:translateY(4px); box-shadow:0 1px 0 #b33000, 0 4px 10px rgba(255,69,0,.3); }
.bigBtn:disabled { opacity:.6; }
.bigBtn:disabled::after { display:none; }
.bigBtn.secondary { background: linear-gradient(180deg, #4facfe, #2196f3); box-shadow: 0 5px 0 #0d5aa0, 0 10px 24px rgba(33,150,243,.3); }
.bigBtn.secondary:active { box-shadow:0 1px 0 #0d5aa0; }
.bigBtn.ghost { background: linear-gradient(180deg, #6a6a7a, #45454f); box-shadow:0 5px 0 #2a2a32; }
.bigBtn.ghost::after { display:none; }
#playBtn { animation: playPulse 2.2s ease-in-out infinite; font-size:21px; }
@keyframes playPulse {
  0%,100% { box-shadow: 0 5px 0 #b33000, 0 10px 24px rgba(255,69,0,.35); }
  50% { box-shadow: 0 5px 0 #b33000, 0 10px 34px rgba(255,140,0,.65); }
}

.smallBtn {
  background: rgba(255,255,255,.08); color:#fff; border:1px solid rgba(255,255,255,.16);
  padding:9px 20px; font-size:13px; border-radius:12px; margin:6px; cursor:pointer;
  font-weight:600; transition: background .15s ease, transform .08s ease;
}
.smallBtn:active { transform:scale(.95); background: rgba(255,255,255,.16); }

.iconGrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.iconBtn {
  position:relative; border:none; border-radius:16px;
  padding:12px 6px 10px; display:flex; flex-direction:column; align-items:center; gap:4px;
  font-size:11.5px; font-weight:800; color:#fff; cursor:pointer;
  box-shadow: 0 5px 0 rgba(0,0,0,.22), 0 8px 18px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.25);
  transition: transform .09s ease, box-shadow .09s ease;
  text-shadow: 0 1px 3px rgba(0,0,0,.3);
}
.iconBtn span.ic { font-size:24px; animation: iconFloat 2.8s ease-in-out infinite; }
.iconBtn:nth-child(2) span.ic { animation-delay: .3s; }
.iconBtn:nth-child(3) span.ic { animation-delay: .6s; }
.iconBtn:nth-child(4) span.ic { animation-delay: .9s; }
@keyframes iconFloat { 0%,100%{ transform:translateY(0) rotate(0);} 50%{ transform:translateY(-3px) rotate(-4deg);} }
.iconBtn:active { transform:translateY(4px) scale(.96); box-shadow: 0 1px 0 rgba(0,0,0,.22), 0 3px 8px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.25); }

.theme-birds { background: linear-gradient(160deg, #34d399, #0d9488); }
.theme-missions { background: linear-gradient(160deg, #c084fc, #7c3aed); }
.theme-stats { background: linear-gradient(160deg, #38bdf8, #2563eb); }
.theme-music { background: linear-gradient(160deg, #fb7185, #db2777); }
.theme-music.musicOn { background: linear-gradient(160deg, #fbbf24, #f59e0b); }

.miniBadge {
  position:absolute; top:-6px; right:-6px; background:#fff; color:#1a1a2e;
  font-size:10px; font-weight:900; border-radius:20px; padding:2px 7px;
  box-shadow: 0 2px 6px rgba(0,0,0,.35); border:2px solid rgba(255,255,255,.5);
}
#missionsBadge { background:#ff3b3b; color:#fff; }

.statRow { display:flex; justify-content:center; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
.statChip {
  background:rgba(0,0,0,.25); border-radius:14px; padding:8px 14px; font-size:12px; font-weight:700;
  display:flex; flex-direction:column; align-items:center; gap:2px; min-width:64px;
}
.statChip span.big { font-size:19px; color:#ffcc00; }
.newRecordBadge {
  display:inline-flex; align-items:center; gap:6px; background:linear-gradient(135deg,#ffe27a,#ffb020);
  color:#4a2e00; font-weight:800; font-size:13px; padding:6px 14px; border-radius:20px;
  margin-bottom:14px; box-shadow:0 4px 14px rgba(255,176,32,.4); animation: badgeIn .4s ease;
}
@keyframes badgeIn { from{ transform:scale(0) rotate(-8deg); opacity:0; } to{ transform:scale(1) rotate(0); opacity:1; } }

.skinRow { display:flex; gap:10px; margin:14px 0 6px; flex-wrap:wrap; justify-content:center; }
.skinItem {
  background: rgba(255,255,255,.06); border:2px solid transparent; border-radius:14px; padding:10px 8px;
  width:76px; cursor:pointer; transition: transform .1s ease, border-color .15s ease, background .15s ease;
}
.skinItem:active { transform:scale(.93); }
.skinItem.selected { border-color:#ffcc00; background:rgba(255,204,0,.12); animation: wiggle 2.4s ease-in-out infinite; }
.skinItem.selected canvas { animation: bob 1.6s ease-in-out infinite; }
.skinItem.locked { opacity:.6; }
.skinItem canvas { width:38px; height:38px; display:block; margin:0 auto; filter: drop-shadow(0 3px 4px rgba(0,0,0,.35)); }
.skinItem .skinLabel { font-size:10px; margin-top:6px; font-weight:700; }
@keyframes wiggle { 0%,100%{ transform:rotate(0);} 50%{ transform:rotate(-2deg);} }
@keyframes bob { 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-3px);} }
@keyframes popIn { 0%{ transform:scale(0) rotate(-10deg); opacity:0;} 70%{ transform:scale(1.12) rotate(3deg); opacity:1;} 100%{ transform:scale(1) rotate(0);} }

.missionItem {
  background:rgba(255,255,255,.06); border-radius:14px; padding:12px 14px; margin-bottom:10px; text-align:left;
}
.missionItem .mLabel { font-size:13px; font-weight:700; margin-bottom:6px; display:flex; justify-content:space-between; }
.missionBarBg { height:9px; background:rgba(255,255,255,.12); border-radius:6px; overflow:hidden; }
.missionBarFill { height:100%; background:linear-gradient(90deg,#ffcc00,#ff8a00); border-radius:6px; transition: width .3s ease; }
.missionDone { color:#7cff6a; font-size:11px; font-weight:800; margin-top:4px; }

.lbRow { display:flex; justify-content:space-between; font-size:13px; padding:7px 4px; border-bottom:1px solid rgba(255,255,255,.08); }
.lbRow:last-child { border-bottom:none; }

#achievementPopup { background:transparent !important; align-items:flex-start; pointer-events:none; backdrop-filter:none !important; animation:none !important; }
.achToast {
  background: linear-gradient(135deg, #ffe27a, #ffb020); color:#3a2400; padding:12px 22px; border-radius:14px; font-weight:800;
  margin-top:64px; box-shadow:0 8px 20px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.5);
  animation: slideDown .45s cubic-bezier(.2,.9,.3,1.3), fadeOut .4s ease 2.6s forwards;
  font-size:14px;
}
@keyframes slideDown { from{transform:translateY(-50px) scale(.8);opacity:0;} to{transform:translateY(0) scale(1);opacity:1;} }
@keyframes fadeOut { to{opacity:0; transform:translateY(-10px);} }

#reviveTimer { font-size:13px; color:rgba(255,255,255,.5); margin-top:4px; }

/* ---- unbox surprise animation ---- */
#unboxOverlay {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.55); z-index:50; pointer-events:none;
}
.unboxBox {
  font-size:70px; animation: boxShake .55s ease-in-out;
}
@keyframes boxShake {
  0%,100% { transform:rotate(0) scale(1); }
  15% { transform:rotate(-8deg) scale(1.05); }
  30% { transform:rotate(8deg) scale(1.05); }
  45% { transform:rotate(-10deg) scale(1.1); }
  60% { transform:rotate(10deg) scale(1.1); }
  80% { transform:rotate(-4deg) scale(1.15); }
}
.unboxReveal {
  display:flex; flex-direction:column; align-items:center; gap:10px;
  animation: revealPop .5s cubic-bezier(.3,1.6,.5,1);
}
@keyframes revealPop { 0%{ transform:scale(0) rotate(-20deg); opacity:0; } 70%{ transform:scale(1.15) rotate(5deg); opacity:1; } 100%{ transform:scale(1) rotate(0); } }
.unboxEmoji { font-size:90px; filter: drop-shadow(0 8px 20px rgba(0,0,0,.5)); }
.unboxName { color:#ffe27a; font-size:24px; font-weight:900; text-shadow:0 2px 0 rgba(0,0,0,.4); }
.confettiPiece {
  position:absolute; top:-20px; width:8px; height:8px; opacity:.9;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity:1; }
  100% { transform: translateY(110vh) rotate(540deg); opacity:0.2; }
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="topBar">
    <div class="coinCount" id="coinCount">🪙 0</div>
    <div class="coinCount" id="bestCount">🏆 0</div>
  </div>
  <div id="scoreDisplay" class="hidden">0</div>

  <div id="menuScreen">
    <div class="card">
      <h1>FlapFoco</h1>
      <div class="menuTip" id="menuTip">💡 toque pra voar entre as barreiras</div>
      <div class="menuStatsTeaser">🏆 <span id="menuBest">0</span> &nbsp;·&nbsp; 🪙 <span id="menuCoins">0</span></div>
      <button class="bigBtn btn" id="playBtn">▶ &nbsp;Jogar</button>
      <div class="iconGrid">
        <button class="iconBtn btn theme-birds" id="shopBtn">
          <span class="ic">🐦</span>Pássaros
          <span class="miniBadge" id="birdsBadge">0/8</span>
        </button>
        <button class="iconBtn btn theme-missions" id="missionsBtn">
          <span class="ic">🎯</span>Missões
          <span class="miniBadge hidden" id="missionsBadge">!</span>
        </button>
        <button class="iconBtn btn theme-stats" id="statsBtn"><span class="ic">📊</span>Stats</button>
        <button class="iconBtn btn theme-music" id="musicBtn"><span class="ic">🎵</span><span id="musicLabel">Música</span></button>
      </div>
    </div>
  </div>

  <div id="gameOverScreen" class="hidden">
    <div class="card">
      <h1 style="font-size:30px;">Fim de Jogo</h1>
      <p id="newRecord" class="hidden newRecordBadge">🏆 Novo recorde!</p>
      <div class="statRow">
        <div class="statChip">PONTOS<span class="big" id="finalScoreVal">0</span></div>
        <div class="statChip">RECORDE<span class="big" id="finalBestVal">0</span></div>
      </div>
      <button class="bigBtn btn" id="reviveBtn">🎥 Reviver (assistir vídeo)</button>
      <div id="reviveTimer" class="hidden"></div>
      <button class="bigBtn secondary btn" id="restartBtn">🔄 Jogar de novo</button>
      <button class="bigBtn ghost btn" id="shareBtn">📤 Compartilhar</button>
      <button class="smallBtn btn" id="menuBtn">Menu</button>
    </div>
  </div>

  <div id="shopScreen" class="hidden">
    <div class="card">
      <h1 style="font-size:26px;">🐣 Pássaros</h1>
      <div class="subtitle">colecione todos e voe com estilo!</div>
      <div class="skinRow" id="skinRow"></div>
      <button class="smallBtn btn" id="closeShopBtn">Fechar</button>
    </div>
  </div>

  <div id="missionsScreen" class="hidden">
    <div class="card">
      <h1 style="font-size:24px;">Missões de hoje</h1>
      <div class="subtitle" id="missionsSubtitle">renovam a cada dia</div>
      <div id="missionsList"></div>
      <button class="smallBtn btn" id="closeMissionsBtn">Fechar</button>
    </div>
  </div>

  <div id="statsScreen" class="hidden">
    <div class="card">
      <h1 style="font-size:24px;">Estatísticas</h1>
      <div class="statRow">
        <div class="statChip">PARTIDAS<span class="big" id="statGames">0</span></div>
        <div class="statChip">CANOS<span class="big" id="statPipes">0</span></div>
        <div class="statChip">PERFEITOS<span class="big" id="statPerfects">0</span></div>
      </div>
      <div class="subtitle" style="margin-top:6px;">últimas 5 partidas</div>
      <div id="leaderboardList"></div>
      <button class="smallBtn btn" id="closeStatsBtn">Fechar</button>
    </div>
  </div>

  <div id="achievementPopup"></div>
</div>

<script>
window.onerror = function(msg, url, line) { document.body.innerHTML = '<div style="color:#fff;background:red;padding:20px;font-size:16px;">ERRO: ' + msg + ' (linha ' + line + ')</div>'; return true; };

/* =========================================================
   FLAPFOCO — engine premium+
   Camadas: céu dia/noite, cidade, colinas, nuvens, pássaros de fundo, chão
   Passarinho: asa animada, squash&stretch, sombra, rastro por skin
   Skins com efeito: normal / fogo / gelo / arco-íris
   Power-up de escudo, PERFEITO! com combo, missões diárias, stats + leaderboard
   Haptics, compartilhar pontuação, música ambiente opcional
   ========================================================= */

// ---------- CONFIG ----------
const CONFIG = {
  gravity: 0.20,
  flapForce: -5.25,
  maxFallSpeed: 7,
  pipeGapBase: 220,
  pipeGapMin: 160,
  pipeSpeedBase: 1.8,
  pipeSpeedMax: 3.2,
  pipeSpacing: 260,
  difficultyRampScore: 25,
  interstitialEveryNGameOvers: 3,
  reviveInvincibleMs: 1000,
  groundHeight: 88,
  shieldChance: 0.16
};

const SKINS = [
  { id:'orange', name:'Foquinho', emoji:'🐤', color:'#ff4500', color2:'#ff8a4c', cost:0, effect:'none', size:1.0, beak:['#ffcc33','#ff7a00'] },
  { id:'blue', name:'Azulzinho', emoji:'🐧', color:'#2196f3', color2:'#6ec6ff', cost:50, effect:'none', size:0.95, beak:['#ffb347','#e8590c'] },
  { id:'green', name:'Tuca', emoji:'🦜', color:'#1b5e20', color2:'#4caf50', cost:80, effect:'none', size:1.05, beak:['#ffd93d','#ff5c2b'] },
  { id:'purple', name:'Roxinho', emoji:'🦉', color:'#9c27b0', color2:'#cf7de0', cost:120, effect:'none', size:0.98, beak:['#ffe27a','#ff8a3d'] },
  { id:'gold', name:'Douradão', emoji:'🐥', color:'#ffd700', color2:'#fff2a8', cost:200, effect:'none', size:1.12, beak:['#ff9d3d','#d9480f'] },
  { id:'fire', name:'Fogareiro', emoji:'🔥', color:'#ff5722', color2:'#ffab40', cost:150, effect:'fire', size:1.0, beak:['#2b2b2b','#111'] },
  { id:'ice', name:'Gelinho', emoji:'❄️', color:'#4fc3f7', color2:'#e1f5fe', cost:150, effect:'ice', size:0.92, beak:['#ffe082','#ff8a3d'] },
  { id:'rainbow', name:'Arco-Íris', emoji:'🌈', color:'#ff4500', color2:'#ffcc00', cost:300, effect:'rainbow', size:1.02, beak:['#fff','#ffcc00'] }
];
const BASE_BIRD_R = 17;
function birdRadiusForSkin(skin) { return BASE_BIRD_R * (skin.size || 1); }

const ACHIEVEMENTS = [
  { id:'score10', label:'🥉 10 pontos!', check: s => s.best >= 10 },
  { id:'score50', label:'🥈 50 pontos!', check: s => s.best >= 50 },
  { id:'score100', label:'🥇 100 pontos!', check: s => s.best >= 100 }
];

const MISSION_POOL = [
  { id:'pipes15', label:'Passe por 15 canos', target:15, key:'pipesToday', reward:15 },
  { id:'pipes30', label:'Passe por 30 canos', target:30, key:'pipesToday', reward:25 },
  { id:'perfect1', label:'Consiga 1 PERFEITO', target:1, key:'perfectsToday', reward:15 },
  { id:'perfect3', label:'Consiga 3 PERFEITOs', target:3, key:'perfectsToday', reward:25 },
  { id:'games2', label:'Jogue 2 partidas', target:2, key:'gamesToday', reward:10 },
  { id:'games4', label:'Jogue 4 partidas', target:4, key:'gamesToday', reward:20 }
];

const MENU_TIPS = [
  '💡 toque pra voar entre as barreiras',
  '⭐ passe bem no meio do vão pra ganhar PERFEITO!',
  '🛡️ pegue o orbe azul: ele te protege de uma batida',
  '🌙 o céu muda sozinho — repare no dia virando noite',
  '🎨 desbloqueie skins com efeitos especiais na loja',
  '🎯 complete as missões diárias pra ganhar moedas extra'
];

// ---------- STORAGE ----------
const store = {
  get(key, def) {
    try { const v = localStorage.getItem(key); return v === null ? def : JSON.parse(v); }
    catch(e){ return def; }
  },
  set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
};

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

let state = {
  best: store.get('flapfoco_best', 0),
  coins: store.get('flapfoco_coins', 0),
  ownedSkins: store.get('flapfoco_owned_skins', ['orange']),
  currentSkin: store.get('flapfoco_current_skin', 'orange'),
  unlockedAch: store.get('flapfoco_achievements', []),
  gameOverCount: store.get('flapfoco_go_count', 0),
  totalGames: store.get('flapfoco_stat_games', 0),
  totalPipes: store.get('flapfoco_stat_pipes', 0),
  totalPerfects: store.get('flapfoco_stat_perfects', 0),
  leaderboard: store.get('flapfoco_leaderboard', []),
  musicOn: store.get('flapfoco_music_on', false),
  missions: store.get('flapfoco_missions', null)
};

function ensureMissions() {
  const today = todayStr();
  if (!state.missions || state.missions.date !== today) {
    const shuffled = [...MISSION_POOL].sort(() => Math.random()-0.5);
    state.missions = {
      date: today,
      active: shuffled.slice(0,3).map(m => ({ id:m.id, progress:0, claimed:false })),
      counters: { pipesToday:0, perfectsToday:0, gamesToday:0 }
    };
    store.set('flapfoco_missions', state.missions);
  }
}
ensureMissions();

function bumpMissionCounter(key, amount) {
  ensureMissions();
  state.missions.counters[key] = (state.missions.counters[key]||0) + amount;
  state.missions.active.forEach(m => {
    const def = MISSION_POOL.find(d => d.id === m.id);
    if (!def || m.claimed) return;
    m.progress = state.missions.counters[def.key] || 0;
    if (m.progress >= def.target && !m.claimed) {
      m.claimed = true;
      state.coins += def.reward;
      bumpCoinUI();
      showAchievementToast('🎯 Missão concluída! +' + def.reward + ' moedas');

const AudioCtx = window.AudioContext || window.webkitAudioContext;

function beep(freq, duration, type='sine', vol=0.15) {
  if (!actx) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  o.connect(g); g.connect(actx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
  o.stop(actx.currentTime + duration);
}

// day/night cycle driven by elapsed frames, animates even on the menu screen
const DAY_CYCLE_LEN = 2400;
const SKY_KEYFRAMES = [
  { t:0.00, top:[255,183,120], bot:[255,214,168] },
  { t:0.22, top:[78,192,202],  bot:[143,216,224] },
  { t:0.48, top:[78,192,202],  bot:[143,216,224] },
  { t:0.62, top:[255,140,90],  bot:[255,190,140] },
  { t:0.75, top:[40,40,90],    bot:[90,70,140] },
  { t:0.90, top:[15,18,45],    bot:[35,35,75] },
  { t:1.00, top:[255,183,120], bot:[255,214,168] }
];
let stars = [];
function initStars() {
  stars = [];
  for (let i=0;i<40;i++) stars.push({ x: Math.random(), y: Math.random()*0.6, r: Math.random()*1.6+0.4, tw: Math.random()*Math.PI*2 });
}
initStars();

function dayPhaseT() { return (bgOffset % DAY_CYCLE_LEN) / DAY_CYCLE_LEN; }
function skyColorsAt(t) {
  for (let i=0;i<SKY_KEYFRAMES.length-1;i++) {
    const a = SKY_KEYFRAMES[i], b = SKY_KEYFRAMES[i+1];
    if (t >= a.t && t <= b.t) {
      const localT = (t - a.t) / (b.t - a.t || 1);
      return { top: lerpColor(a.top, b.top, localT), bot: lerpColor(a.bot, b.bot, localT) };
    }
  }
  return { top: SKY_KEYFRAMES[0].top, bot: SKY_KEYFRAMES[0].bot };
}
function smoothWindow(t, inStart, inEnd, outStart, outEnd) {
  if (t < inStart) return 0;
  if (t < inEnd) return (t-inStart)/(inEnd-inStart);
  if (t < outStart) return 1;
  if (t < outEnd) return 1 - (t-outStart)/(outEnd-outStart);
  return 0;
}
function lerpColor(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }
function rgb(c){ return `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; }

function drawSky() {
  const groundY = canvas.height - CONFIG.groundHeight;
  const dayT = dayPhaseT();
  const colors = skyColorsAt(dayT);
  const grad = ctx.createLinearGradient(0,0,0,groundY);
  grad.addColorStop(0, rgb(colors.top));
  grad.addColorStop(1, rgb(colors.bot));
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width, groundY + 30);

  nightLevel = smoothWindow(dayT, 0.68, 0.78, 0.95, 1.0);
  if (nightLevel > 0.01) {
    ctx.save();
    stars.forEach(s => {
      const tw = 0.55 + Math.sin(bgOffset*0.05 + s.tw)*0.45;
      ctx.globalAlpha = nightLevel * tw;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x*canvas.width, s.y*groundY, s.r, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.restore();
  }

  const arcT = dayT;
  const arcX = arcT * (canvas.width + 160) - 80;
  const arcY = groundY*0.75 - Math.sin(arcT*Math.PI) * (groundY*0.6);
  const isDay = dayT < 0.6 || dayT > 0.98;
  const glowColor = isDay ? '255,214,120' : '210,220,255';
  const bodyColor = isDay ? '#fff4c2' : '#e8ecff';
  ctx.save();
  const haloGrad = ctx.createRadialGradient(arcX,arcY,4, arcX,arcY,42);
  haloGrad.addColorStop(0, `rgba(${glowColor},0.55)`);
  haloGrad.addColorStop(1, `rgba(${glowColor},0)`);
  ctx.fillStyle = haloGrad;
  ctx.beginPath(); ctx.arc(arcX,arcY,42,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = bodyColor;
  ctx.beginPath(); ctx.arc(arcX,arcY,16,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCloud(c) {
  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = '#ffffff';
  const s = c.scale;
  ctx.beginPath();
  ctx.ellipse(c.x, c.y, 34*s, 16*s, 0, 0, Math.PI*2);
  ctx.ellipse(c.x+26*s, c.y-8*s, 22*s, 14*s, 0, 0, Math.PI*2);
  ctx.ellipse(c.x-24*s, c.y-4*s, 20*s, 13*s, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}
function updateDrawClouds() {
  clouds.forEach(c => {
    c.x -= c.speed;
    if (c.x < -80) c.x = canvas.width + 80 + Math.random()*100;
    drawCloud(c);
  });
}

function drawHills() {
  const groundY = canvas.height - CONFIG.groundHeight;
  ctx.fillStyle = 'rgba(90,110,160,0.35)';
  const scroll = bgOffset * 0.15;
  hillsPath.forEach(h => {
    let hx = h.x - (scroll % (canvas.width*2));
    if (hx < -h.w*1.5) hx += canvas.width*2 + 300;
    ctx.beginPath();
    ctx.moveTo(hx, groundY);
    ctx.quadraticCurveTo(hx + h.w/2, groundY - h.h, hx + h.w, groundY);
    ctx.closePath();
    ctx.fill();
  });
}

function drawCity() {
  const groundY = canvas.height - CONFIG.groundHeight;
  const scroll = bgOffset * 0.32;
  ctx.save();
  cityPath.forEach(b => {
    let bx = b.x - (scroll % (canvas.width*2));
    if (bx < -b.w*1.5) bx += canvas.width*2 + 200;
    const by = groundY - b.h;
    ctx.fillStyle = 'rgba(35,30,55,0.55)';
    ctx.fillRect(bx, by, b.w, b.h);
    b.windows.forEach(win => {
      const wx = bx + 4 + win.c * (b.w/b.cols);
      const wy = by + 5 + win.r * 15;
      const lit = nightLevel > 0.35;
      ctx.fillStyle = lit ? 'rgba(255,220,120,0.85)' : 'rgba(255,255,255,0.12)';
      ctx.fillRect(wx, wy, 4, 6);
    });
  });
  ctx.restore();
}

function drawGround() {
  const groundY = canvas.height - CONFIG.groundHeight;
  const grad = ctx.createLinearGradient(0, groundY, 0, canvas.height);
  grad.addColorStop(0, '#c2a25a');
  grad.addColorStop(1, '#8a6d3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, groundY, canvas.width, CONFIG.groundHeight);

  ctx.fillStyle = '#7cc55e';
  ctx.fillRect(0, groundY, canvas.width, 14);
  ctx.fillStyle = '#69b34e';
  const scroll = bgOffset % 28;
  for (let x = -scroll; x < canvas.width; x += 28) {
    ctx.beginPath();
    ctx.moveTo(x, groundY+2);
    ctx.lineTo(x+14, groundY-8);
    ctx.lineTo(x+28, groundY+2);
    ctx.fill();
  }
}

// ---------- BIRD ----------
let bird = { x:0, y:0, vy:0, r:17, rot:0, wingT:0 };
let pipes = [], score = 0, difficultyLevel = 0, invincibleUntil = 0, gameRunning = false, gamePaused = false;
let idleBaseY = 0;
let countingDown = false, countdownValue = 0, countdownScale = 1;
let perfectStreak = 0;

function currentSkin() { return SKINS.find(s => s.id === state.currentSkin) || SKINS[0]; }
function getSkinColors(skin) {
  if (skin.effect === 'rainbow') {
    const hue = (bgOffset*2) % 360;
    return { color: `hsl(${hue},85%,55%)`, color2: `hsl(${(hue+40)%360},90%,75%)` };
  }
  return { color: skin.color, color2: skin.color2 };
}

function resetGame() {
  bird = { x: canvas.width*0.28, y: canvas.height/2, vy:0, r:birdRadiusForSkin(currentSkin()), rot:0, wingT:0 };
  pipes = [];
  powerUps = [];

  score = 0;
  difficultyLevel = 0;
  invincibleUntil = 0;
  particles = [];
  floatTexts = [];
  shakeMag = 0; flashAlpha = 0;
  perfectStreak = 0;
  spawnPipe();
}
function setIdleBird() {
  idleBaseY = canvas.height/2;
  bird.x = canvas.width*0.28;
  bird.y = idleBaseY;
  bird.r = birdRadiusForSkin(currentSkin());
}

function spawnPipe() {
  const gap = Math.max(CONFIG.pipeGapBase - difficultyLevel*6, CONFIG.pipeGapMin);
  const playableH = canvas.height - CONFIG.groundHeight;
  const margin = 60;
  const gapY = margin + Math.random()*(playableH - margin*2 - gap);
  pipes.push({ x: canvas.width + 40, gapY, gap, passed:false, w:56 });

  if (Math.random() < CONFIG.shieldChance) {
    powerUps.push({ x: canvas.width + 40 + 40, y: gapY + gap/2, collected:false, type:'shield' });
  }
}
function pipeSpeed() { return Math.min(CONFIG.pipeSpeedBase + difficultyLevel*0.18, CONFIG.pipeSpeedMax); }

function flap() {
  ensureAudio();
  if (!gameRunning) return;
  bird.vy = CONFIG.flapForce;
  bird.wingT = 1;
  Sound.flap(flapPitchFor(currentSkin()));
  vibrate(8);
}

function updateGame() {
  bgOffset += 1;

  if (!gameRunning || gamePaused) {
    if (!countingDown) {
      bird.y = idleBaseY + Math.sin(bgOffset*0.045) * 9;
      bird.rot = Math.sin(bgOffset*0.045) * 6;
      bird.wingT = (Math.sin(bgOffset*0.09) + 1) * 0.22;
    }
    return;
  }

  bird.vy += CONFIG.gravity;
  bird.vy = Math.min(bird.vy, CONFIG.maxFallSpeed);
  bird.y += bird.vy;
  bird.rot = Math.max(-30, Math.min(70, bird.vy * 4));
  bird.wingT = Math.max(0, bird.wingT - 0.06);

  if (bgOffset % 3 === 0) {
    const skin = currentSkin();
    const colors = getSkinColors(skin);
    if (skin.effect === 'fire') {
      particles.push({ x: bird.x - bird.r*0.5, y: bird.y + 3, vx:-0.5-Math.random()*0.7, vy:-0.3-Math.random()*0.6,
        life:18, maxLife:18, color: Math.random()<0.5 ? '#ff7043' : '#ffca28', r: 2+Math.random()*1.8 });
    } else if (skin.effect === 'ice') {
      particles.push({ x: bird.x - bird.r*0.5, y: bird.y + 2, vx:-0.4-Math.random()*0.4, vy:(Math.random()-0.5)*0.5,
        life:22, maxLife:22, color:'#e1f5fe', r: 1.2+Math.random()*1.3 });
    } else {
      particles.push({ x: bird.x - bird.r*0.6, y: bird.y + 2, vx:-0.6-Math.random()*0.6, vy:(Math.random()-0.5)*0.6,
        life:16, maxLife:16, color: colors.color2, r: 1.4+Math.random()*1.2 });
    }
  }

  const speed = pipeSpeed();
  pipes.forEach(p => p.x -= speed);
  powerUps.forEach(p => p.x -= speed);
  if (pipes.length && pipes[pipes.length-1].x < canvas.width - CONFIG.pipeSpacing) spawnPipe();
  pipes = pipes.filter(p => p.x > -80);
  powerUps = powerUps.filter(p => p.x > -80 && !p.collected);

  powerUps.forEach(p => {
    if (!p.collected) {
      const d = Math.hypot(bird.x-p.x, bird.y-p.y);
      if (d < bird.r + 14) {
        p.collected = true;
        hasShield = true;
        Sound.shield();
        vibrate([10,20,10]);
        spawnParticles(p.x,p.y,'#4fc3f7',14);
        spawnFloatText(p.x, p.y-20, 'ESCUDO!', '#4fc3f7', 16);
      }
    }
  });

  const invincible = Date.now() < invincibleUntil;
  const playableH = canvas.height - CONFIG.groundHeight;

  const outOfBounds = bird.y - bird.r < 0 || bird.y + bird.r > playableH;
  if (!invincible && outOfBounds) {
    if (hasShield) { consumeShield(); bird.y = Math.max(bird.r+2, Math.min(playableH-bird.r-2, bird.y)); bird.vy = -2; }
    else return endGame();
  }

  let collided = false;
  pipes.forEach(p => {
    if (!p.passed && p.x + p.w < bird.x - bird.r) {
      p.passed = true;
      score++;
      Sound.score();
      spawnParticles(bird.x, bird.y, currentSkin().color, 10);
      triggerFlash('255,255,255', 0.12);
      state.coins += 1;
      bumpMissionCounter('pipesToday', 1);

      const gapCenter = p.gapY + p.gap/2;
      const isPerfect = Math.abs(bird.y - gapCenter) < p.gap * 0.16;
      if (isPerfect) {
        perfectStreak++;
        state.coins += 1;
        spawnParticles(bird.x, bird.y, '#ffe27a', 18);
        spawnFloatText(bird.x, bird.y - 26, perfectStreak >= 3 ? 'PERFEITO! x' + perfectStreak : 'PERFEITO! +2', '#ffe27a');
        beep(1180, 0.1, 'sine', 0.13);
        vibrate([10,30,10]);
        bumpMissionCounter('perfectsToday', 1);
        state.totalPerfects++;
        store.set('flapfoco_stat_perfects', state.totalPerfects);
      } else {
        perfectStreak = 0;
        spawnFloatText(bird.x, bird.y - 24, '+1', '#ffe27a');
      }

      store.set('flapfoco_coins', state.coins);
      state.totalPipes++;
      store.set('flapfoco_stat_pipes', state.totalPipes);
      bumpCoinUI();
      if (score % CONFIG.difficultyRampScore === 0) difficultyLevel++;
    }
    const inX = bird.x + bird.r > p.x && bird.x - bird.r < p.x + p.w;
    const inGapTop = bird.y - bird.r < p.gapY;
    const inGapBottom = bird.y + bird.r > p.gapY + p.gap;
    if (!invincible && !collided && inX && (inGapTop || inGapBottom)) {
      if (hasShield) { consumeShield(); }
      else { collided = true; }
    }
  });
  if (collided) return endGame();

  updateParticles();
  const scoreEl = document.getElementById('scoreDisplay');
  if (scoreEl.textContent != score) {
    scoreEl.textContent = score;
    scoreEl.classList.remove('scorePop'); void scoreEl.offsetWidth; scoreEl.classList.add('scorePop');
  }
}

function consumeShield() {
  hasShield = false;
  invincibleUntil = Date.now() + 700;
  triggerFlash('79,195,247', 0.3);
  spawnParticles(bird.x, bird.y, '#4fc3f7', 16);
  vibrate([15,15,15]);
}

let displayedCoins = state.coins;
function bumpCoinUI() {
  const el = document.getElementById('coinCount');
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  document.getElementById('menuCoins').textContent = state.coins;
}
function updateCoinCountDisplay() {
  if (displayedCoins === state.coins) return;
  const diff = state.coins - displayedCoins;
  const step = Math.sign(diff) * Math.max(1, Math.ceil(Math.abs(diff) * 0.22));
  displayedCoins += (Math.abs(step) > Math.abs(diff)) ? diff : step;
  document.getElementById('coinCount').textContent = '🪙 ' + displayedCoins;
}

function endGame() {
  gameRunning = false;
  Sound.hit();

// ---------- DRAW BIRD ----------
function drawBird() {
  const skin = currentSkin();
  const colors = getSkinColors(skin);
  const beak = skin.beak || ['#ffb020','#e8590c'];
  const invincible = Date.now() < invincibleUntil;
  const r = bird.r;

  const playableH = canvas.height - CONFIG.groundHeight;
  const shadowScale = Math.max(0.3, 1 - (playableH - bird.y) / playableH * 0.5);
  ctx.save();
  ctx.globalAlpha = 0.22 * shadowScale;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(bird.x, playableH + 6, r*0.95*shadowScale, r*0.3*shadowScale, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot * Math.PI/180);

  const stretch = Math.max(-0.18, Math.min(0.28, bird.vy/26));
  ctx.scale(1 - stretch*0.5, 1 + stretch*0.5);
  ctx.globalAlpha = invincible ? (Math.sin(Date.now()/50)*0.3+0.7) : 1;

  const flapArc = -0.3 - bird.wingT*1.3;
  const headX = r*0.6, headY = -r*0.18;
  const headR = r*0.58;

  // simple pointed tail (single clean shape, no fan)
  ctx.fillStyle = colors.color;
  ctx.beginPath();
  ctx.moveTo(-r*0.55, -r*0.28);
  ctx.lineTo(-r*1.35, 0);
  ctx.lineTo(-r*0.55, r*0.28);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.16)'; ctx.lineWidth = 1.2;
  ctx.stroke();

  // back wing (single solid shape, behind torso)
  ctx.save();
  ctx.translate(-r*0.05, r*0.05);
  ctx.rotate(flapArc*0.8);
  ctx.fillStyle = colors.color;
  ctx.beginPath();
  ctx.ellipse(-r*0.1, r*0.1, r*0.62, r*0.3, -0.25, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // torso — one smooth gradient shape, no extra shading layers
  const bodyGrad = ctx.createRadialGradient(-r*0.25,-r*0.3,2, 0,0, r*1.2);
  bodyGrad.addColorStop(0, colors.color2);
  bodyGrad.addColorStop(1, colors.color);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, r*0.05, r*0.92, r*0.82, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.14)'; ctx.lineWidth = 1.3;
  ctx.stroke();

  // belly patch — crisp, opaque, small enough to read as a marking not a smudge
  ctx.fillStyle = '#fff8ea';
  ctx.beginPath();
  ctx.ellipse(-r*0.08, r*0.34, r*0.42, r*0.32, 0, 0, Math.PI*2);
  ctx.fill();

  // head — solid color, clearly separated from torso
  ctx.fillStyle = colors.color2;
  ctx.beginPath();
  ctx.arc(headX, headY, headR, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.14)'; ctx.lineWidth = 1.3;
  ctx.stroke();

  // cheek blush — small warm touch just under the eye
  ctx.fillStyle = 'rgba(255,120,120,0.35)';
  ctx.beginPath();
  ctx.ellipse(headX+headR*0.05, headY+headR*0.28, headR*0.28, headR*0.18, 0, 0, Math.PI*2);
  ctx.fill();

  // beak — big, curved, single clean fill (no extra ridge/shadow clutter)
  const bx = headX + headR*0.5, by = headY - headR*0.02;
  const beakLen = r*1.3, beakH = headR*0.65;
  const beakGrad = ctx.createLinearGradient(bx,0,bx+beakLen,0);
  beakGrad.addColorStop(0, beak[0]);
  beakGrad.addColorStop(1, beak[1]);
  ctx.fillStyle = beakGrad;
  ctx.beginPath();
  ctx.moveTo(bx, by - beakH*0.5);
  ctx.quadraticCurveTo(bx + beakLen*0.7, by - beakH*0.75, bx + beakLen, by - beakH*0.05);
  ctx.quadraticCurveTo(bx + beakLen*0.65, by + beakH*0.4, bx, by + beakH*0.45);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
  ctx.stroke();

  // glossy highlight streak for a polished, glossy beak
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.4; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(bx+beakLen*0.12, by - beakH*0.28);
  ctx.quadraticCurveTo(bx + beakLen*0.55, by - beakH*0.5, bx + beakLen*0.8, by - beakH*0.18);
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(headX+headR*0.12, headY-headR*0.25, headR*0.32, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(headX+headR*0.24, headY-headR*0.25, headR*0.16, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(headX+headR*0.29, headY-headR*0.32, headR*0.06, 0, Math.PI*2); ctx.fill();

  // front wing — the main flap motion, one bold shape on top
  ctx.save();
  ctx.translate(-r*0.05, r*0.12);
  ctx.rotate(flapArc);
  const wingGrad = ctx.createLinearGradient(-r*0.6,-r*0.2,r*0.3,r*0.3);
  wingGrad.addColorStop(0, colors.color2);
  wingGrad.addColorStop(1, colors.color);
  ctx.fillStyle = wingGrad;
  ctx.beginPath();
  ctx.ellipse(-r*0.05, r*0.05, r*0.68, r*0.34, -0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();

  ctx.restore();
  ctx.globalAlpha = 1;

  drawShieldOnBird();
}

// ---------- DRAW PIPES ----------
function drawPipes() {
  const playableH = canvas.height - CONFIG.groundHeight;
  pipes.forEach(p => {
    drawPipeSegment(p.x, 0, p.w, p.gapY, true);
    drawPipeSegment(p.x, p.gapY + p.gap, p.w, playableH - (p.gapY + p.gap), false);
  });
}
function drawPipeSegment(x, y, w, h, isTop) {
  if (h <= 0) return;
  const grad = ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0, '#2d7d46');
  grad.addColorStop(0.5, '#4fbf6d');
  grad.addColorStop(1, '#2d7d46');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(x+6, y, 6, h);

  const capH = 18;
  ctx.fillStyle = '#256b3a';
  const capY = isTop ? y+h-capH : y;
  ctx.fillRect(x-4, capY, w+8, capH);
  ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 2;
  ctx.strokeRect(x-4, capY, w+8, capH);

  if (nightLevel > 0.3) {
    ctx.fillStyle = `rgba(255,220,140,${nightLevel*0.8})`;
    ctx.beginPath(); ctx.arc(x-2, capY+capH/2, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w+2, capY+capH/2, 2.5, 0, Math.PI*2); ctx.fill();
  }
}

// ---------- MAIN LOOP ----------
function loop(t) {
  ctx.save();

  if (shakeMag > 0.3) {
    ctx.translate((Math.random()-0.5)*shakeMag, (Math.random()-0.5)*shakeMag);
    shakeMag *= 0.88;
  } else shakeMag = 0;

  ctx.clearRect(-20,-20,canvas.width+40,canvas.height+40);
  drawSky();
  drawHills();
  drawCity();
  updateDrawClouds();
  updateDrawAmbientBirds();

  updateGame();

  drawGround();
  drawPowerUps();
  drawPipes();
  drawBird();
  drawParticles();
  updateDrawFloatTexts();
  drawVignette();
  updateCoinCountDisplay();

  if (countingDown) {
    countdownScale += (1 - countdownScale) * 0.18;
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2 - 40);
    ctx.scale(countdownScale, countdownScale);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '900 78px Segoe UI, Arial, sans-serif';
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillText(countdownValue > 0 ? String(countdownValue) : 'VOA!', 3, 4);
    ctx.fillStyle = countdownValue > 0 ? '#fff' : '#ffe27a';
    ctx.fillText(countdownValue > 0 ? String(countdownValue) : 'VOA!', 0, 0);
    ctx.restore();
  }

  if (flashAlpha > 0.01) {
    ctx.fillStyle = `rgba(${flashColor},${flashAlpha})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    flashAlpha *= 0.85;
  }

  ctx.restore();
  requestAnimationFrame(loop);
}

function renderShop() {
  const row = document.getElementById('skinRow');
  row.innerHTML = '';
  SKINS.forEach((skin, i) => {
    const owned = state.ownedSkins.includes(skin.id);
    const selected = state.currentSkin === skin.id;
    const div = document.createElement('div');
    div.className = 'skinItem' + (owned ? '' : ' locked') + (selected ? ' selected' : '');
    div.style.animation = `popIn .4s cubic-bezier(.3,1.6,.5,1) ${i*0.06}s backwards`;
    const c = document.createElement('canvas');
    c.width = 40; c.height = 40;
    const cctx = c.getContext('2d');
    const g = cctx.createRadialGradient(14,12,2,20,20,18);
    g.addColorStop(0, skin.color2); g.addColorStop(1, skin.color);
    cctx.fillStyle = g;
    cctx.beginPath(); cctx.arc(20,20,16,0,Math.PI*2); cctx.fill();
    cctx.font = '18px sans-serif'; cctx.textAlign='center'; cctx.textBaseline='middle';
    cctx.fillText(skin.emoji, 20, 21);
    div.appendChild(c);
    const label = document.createElement('div');
    label.className = 'skinLabel';
    label.textContent = owned ? skin.name : (skin.name + ' 🪙' + skin.cost);
    div.appendChild(label);
    if (selected) {
      const tag = document.createElement('div');
      tag.style.cssText = 'font-size:9px;color:#ffcc00;font-weight:800;margin-top:2px;';
      tag.textContent = '★ voando agora';
      div.appendChild(tag);
    }
    div.addEventListener('click', () => {
      if (owned) {
        state.currentSkin = skin.id;
        store.set('flapfoco_current_skin', skin.id);
        Sound.achievement();
        renderShop();
      } else if (state.coins >= skin.cost) {
        state.coins -= skin.cost;
        state.ownedSkins.push(skin.id);
        store.set('flapfoco_coins', state.coins);
        store.set('flapfoco_owned_skins', state.ownedSkins);
        bumpCoinUI();
        playUnboxAnimation(skin);
        renderShop();
      } else {
        Ads.showRewarded(() => {
          state.coins += 30;
          store.set('flapfoco_coins', state.coins);
          bumpCoinUI();
          renderShop();
        });
      }
    });
    row.appendChild(div);
  });
}

  renderMissions();
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('missionsScreen').classList.remove('hidden');
});
document.getElementById('closeMissionsBtn').addEventListener('click', () => {
  document.getElementById('missionsScreen').classList.add('hidden');
  document.getElementById('menuScreen').classList.remove('hidden');
  updateMenuBadges();
});

// ---------- STATS ----------
function renderStats() {
  document.getElementById('statGames').textContent = state.totalGames;
  document.getElementById('statPipes').textContent = state.totalPipes;
  document.getElementById('statPerfects').textContent = state.totalPerfects;
  const list = document.getElementById('leaderboardList');
  list.innerHTML = '';
  if (state.leaderboard.length === 0) {
    list.innerHTML = '<div class="subtitle">jogue uma partida pra aparecer aqui</div>';
  } else {
    state.leaderboard.forEach((entry, i) => {
      const row = document.createElement('div');
      row.className = 'lbRow';
      row.innerHTML = `<span>#${i+1} — ${entry.date}</span><span style="color:#ffcc00;font-weight:800;">${entry.score}</span>`;
      list.appendChild(row);
    });
  }
}
document.getElementById('statsBtn').addEventListener('click', () => {
  renderStats();
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('statsScreen').classList.remove('hidden');
});
document.getElementById('closeStatsBtn').addEventListener('click', () => {
  document.getElementById('statsScreen').classList.add('hidden');
  document.getElementById('menuScreen').classList.remove('hidden');
  updateMenuBadges();
});

// ---------- SHARE ----------
function generateShareImage() {
  const c = document.createElement('canvas');
  c.width = 600; c.height = 800;
  const sctx = c.getContext('2d');
  const grad = sctx.createLinearGradient(0,0,0,800);
  grad.addColorStop(0,'#4ec0ca'); grad.addColorStop(1,'#1a1a2e');
  sctx.fillStyle = grad; sctx.fillRect(0,0,600,800);

  sctx.textAlign = 'center';
  sctx.fillStyle = '#ffcc00';
  sctx.font = '900 54px Segoe UI, Arial, sans-serif';
  sctx.fillText('FlapFoco', 300, 160);

  sctx.fillStyle = '#fff';
  sctx.font = '700 24px Segoe UI, Arial, sans-serif';
  sctx.fillText('minha pontuação', 300, 340);
  sctx.font = '900 110px Segoe UI, Arial, sans-serif';
  sctx.fillStyle = '#ff8a3d';
  sctx.fillText(String(score), 300, 470);

  sctx.font = '700 20px Segoe UI, Arial, sans-serif';
  sctx.fillStyle = 'rgba(255,255,255,0.7)';
  sctx.fillText('recorde: ' + state.best, 300, 540);

  const skin = currentSkin();
  const colors = getSkinColors(skin);
  sctx.save();
  sctx.translate(300, 640);
  const bg = sctx.createRadialGradient(-8,-10,3,0,0,44);
  bg.addColorStop(0, colors.color2); bg.addColorStop(1, colors.color);
  sctx.fillStyle = bg;
  sctx.beginPath(); sctx.arc(0,0,40,0,Math.PI*2); sctx.fill();
  sctx.restore();

  return c;
}
document.getElementById('shareBtn').addEventListener('click', async () => {
  const shareCanvas = generateShareImage();
  shareCanvas.toBlob(async (blob) => {
    if (!blob) return;
    const file = new File([blob], 'flapfoco-score.png', { type:'image/png' });
    if (navigator.canShare && navigator.canShare({ files:[file] })) {
      try {
        await navigator.share({ files:[file], title:'FlapFoco', text:'Fiz ' + score + ' pontos no FlapFoco!' });
        return;
      } catch(e) {}
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'flapfoco-score.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  }, 'image/png');
});

// ---------- START ----------
resize();
buildCity();
initAds().then(() => Ads.showBanner());
requestAnimationFrame(loop);
</script>
